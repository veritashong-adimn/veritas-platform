openapi: 3.1.0
info:
  title: Api
  version: 0.9.0
  description: 통번역 플랫폼 API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: users
    description: User operations
  - name: projects
    description: Project operations
  - name: quotes
    description: Quote operations
  - name: tasks
    description: Task operations
  - name: admin
    description: Admin (CRM) operations — admin role only
  - name: payments
    description: Payment operations
  - name: upload
    description: File upload operations
  - name: logs
    description: Log operations
  - name: settlements
    description: Settlement operations — translator payout management
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /auth/register:
    post:
      operationId: registerUser
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User registered and token issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error or duplicate email
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /auth/login:
    post:
      operationId: loginUser
      tags: [auth]
      summary: Login and receive JWT token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /users:
    post:
      operationId: createUser
      tags: [users]
      summary: Create a user (no password, legacy)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /projects:
    post:
      operationId: createProject
      tags: [projects]
      summary: Create a project (customer only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectRequest"
      responses:
        "201":
          description: Project created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden (wrong role)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      operationId: listProjects
      tags: [projects]
      summary: List projects (optional userId filter)
      parameters:
        - name: userId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
  /projects/{id}/match:
    post:
      operationId: matchProject
      tags: [projects]
      summary: Match a translator to an approved project
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "201":
          description: Task created and translator matched
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "400":
          description: Project not approved or already matched
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Project or translator not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /quotes:
    post:
      operationId: createQuote
      tags: [quotes]
      summary: Create a quote for a project
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateQuoteRequest"
      responses:
        "201":
          description: Quote created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quote"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Project not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /quotes/{id}/approve:
    post:
      operationId: approveQuote
      tags: [quotes]
      summary: Approve a quote
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Quote approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quote"
        "400":
          description: Already approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Quote not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /tasks:
    get:
      operationId: listTasks
      tags: [tasks]
      summary: List tasks (optional translatorId filter)
      parameters:
        - name: translatorId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of tasks with project info
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TaskWithProject"
  /tasks/{id}/start:
    patch:
      operationId: startTask
      tags: [tasks]
      summary: Start a task (translator only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Task started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "400":
          description: Invalid state transition
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Not assigned to this task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Task not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /tasks/{id}/complete:
    patch:
      operationId: completeTask
      tags: [tasks]
      summary: Complete a task (translator only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Task completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "400":
          description: Invalid state transition
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Not assigned to this task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Task not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /admin/projects:
    get:
      operationId: adminListProjects
      tags: [admin]
      summary: List all projects with customer info (admin only)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: All projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminProject"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /admin/payments:
    get:
      operationId: adminListPayments
      tags: [admin]
      summary: List all payments with project info (admin only)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: All payments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminPayment"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /admin/tasks:
    get:
      operationId: adminListTasks
      tags: [admin]
      summary: List all tasks with project and translator info (admin only)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: All tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminTask"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /admin/logs/{projectId}:
    get:
      operationId: adminGetProjectLogs
      tags: [admin]
      summary: Get event logs for a project (admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Project logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Log"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /payments/request:
    post:
      operationId: requestPayment
      tags: [payments]
      summary: Create a payment request for an approved project
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentRequestBody"
      responses:
        "201":
          description: Payment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentRequestResponse"
        "400":
          description: Project not in approved state or no approved quote
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Project or quote not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /payments/confirm:
    post:
      operationId: confirmPayment
      tags: [payments]
      summary: Confirm or fail a payment
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentConfirmBody"
      responses:
        "200":
          description: Payment status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"
        "400":
          description: Already processed or invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Payment not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /payments:
    get:
      operationId: listPayments
      tags: [payments]
      summary: List payments (optional projectId filter)
      parameters:
        - name: projectId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of payments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Payment"
  /upload:
    post:
      operationId: uploadFile
      tags: [upload]
      summary: Upload a file to R2 storage (max 10MB)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
              required:
                - file
      responses:
        "201":
          description: File uploaded successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadResponse"
        "400":
          description: No file or invalid file type
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: R2 not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /logs:
    get:
      operationId: listLogs
      tags: [logs]
      summary: List all event logs
      parameters:
        - name: entityType
          in: query
          required: false
          schema:
            type: string
            enum: [project, quote, task]
        - name: entityId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Log"
  /api/admin/settlements:
    get:
      operationId: adminListSettlements
      tags: [settlements]
      summary: List all settlements (admin only)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of settlements with project and translator info
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminSettlement"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/admin/settlements/{id}/pay:
    patch:
      operationId: adminPaySettlement
      tags: [settlements]
      summary: Mark a settlement as paid (admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Settlement marked as paid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminSettlement"
        "400":
          description: Already paid or not in ready state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Settlement not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/settlements/my:
    get:
      operationId: mySettlements
      tags: [settlements]
      summary: Get current translator's settlements
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of settlements for the authenticated translator
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MySettlement"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  responses:
    Unauthorized:
      description: Missing or invalid Bearer token
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Insufficient role permissions
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    RegisterRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
        role:
          type: string
          enum: [customer, translator, admin]
          default: customer
      required:
        - email
        - password
    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required:
        - email
        - password
    AuthResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/UserPublic"
      required:
        - token
        - user
    UserPublic:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        role:
          type: string
          enum: [customer, translator, admin]
      required:
        - id
        - email
        - role
    CreateUserRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        role:
          type: string
          enum: [customer, translator, admin]
          default: customer
      required:
        - email
    User:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        role:
          type: string
          enum: [customer, translator, admin]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - email
        - role
        - createdAt
    CreateProjectRequest:
      type: object
      properties:
        title:
          type: string
        fileUrl:
          type: string
          nullable: true
          description: URL of an uploaded file (from /api/upload)
      required:
        - title
    Project:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        title:
          type: string
        fileUrl:
          type: string
          nullable: true
        status:
          type: string
          enum: [created, quoted, approved, paid, matched, in_progress, completed]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - userId
        - title
        - status
        - createdAt
    CreateQuoteRequest:
      type: object
      properties:
        projectId:
          type: integer
        price:
          type: number
          minimum: 0
      required:
        - projectId
        - price
    Quote:
      type: object
      properties:
        id:
          type: integer
        projectId:
          type: integer
        price:
          type: string
        status:
          type: string
          enum: [pending, sent, approved, rejected]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - projectId
        - price
        - status
        - createdAt
    Task:
      type: object
      properties:
        id:
          type: integer
        projectId:
          type: integer
        translatorId:
          type: integer
        status:
          type: string
          enum: [waiting, assigned, working, done]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - projectId
        - translatorId
        - status
        - createdAt
    TaskWithProject:
      type: object
      properties:
        id:
          type: integer
        projectId:
          type: integer
        translatorId:
          type: integer
        status:
          type: string
          enum: [waiting, assigned, working, done]
        createdAt:
          type: string
          format: date-time
        projectTitle:
          type: string
          nullable: true
        projectStatus:
          type: string
          nullable: true
      required:
        - id
        - projectId
        - translatorId
        - status
        - createdAt
    Log:
      type: object
      properties:
        id:
          type: integer
        entityType:
          type: string
          enum: [project, quote, task]
        entityId:
          type: integer
        action:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - entityType
        - entityId
        - action
        - createdAt
    PaymentRequestBody:
      type: object
      properties:
        projectId:
          type: integer
      required:
        - projectId
    PaymentRequestResponse:
      type: object
      properties:
        paymentId:
          type: integer
        amount:
          type: number
      required:
        - paymentId
        - amount
    PaymentConfirmBody:
      type: object
      properties:
        paymentId:
          type: integer
        success:
          type: boolean
      required:
        - paymentId
        - success
    Payment:
      type: object
      properties:
        id:
          type: integer
        projectId:
          type: integer
        amount:
          type: string
        status:
          type: string
          enum: [pending, paid, failed]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - projectId
        - amount
        - status
        - createdAt
    SettlementStatus:
      type: string
      enum: [pending, ready, paid]
      description: "pending: 정산 대기, ready: 정산 가능, paid: 지급 완료"
    AdminSettlement:
      type: object
      properties:
        id:
          type: integer
        projectId:
          type: integer
        translatorId:
          type: integer
        paymentId:
          type: integer
          nullable: true
        totalAmount:
          type: string
          description: 고객 결제 총액
        translatorAmount:
          type: string
          description: 번역사 지급액 (총액의 70%)
        platformFee:
          type: string
          description: 플랫폼 수수료 (총액의 30%)
        status:
          $ref: "#/components/schemas/SettlementStatus"
        createdAt:
          type: string
          format: date-time
        projectTitle:
          type: string
          nullable: true
        translatorEmail:
          type: string
          nullable: true
      required:
        - id
        - projectId
        - translatorId
        - totalAmount
        - translatorAmount
        - platformFee
        - status
        - createdAt
    MySettlement:
      type: object
      properties:
        id:
          type: integer
        projectId:
          type: integer
        totalAmount:
          type: string
        translatorAmount:
          type: string
          description: 번역사 지급 예정 금액 (총액의 70%)
        platformFee:
          type: string
        status:
          $ref: "#/components/schemas/SettlementStatus"
        createdAt:
          type: string
          format: date-time
        projectTitle:
          type: string
          nullable: true
      required:
        - id
        - projectId
        - totalAmount
        - translatorAmount
        - platformFee
        - status
        - createdAt
    UploadResponse:
      type: object
      properties:
        fileUrl:
          type: string
          description: Public URL of the uploaded file
      required:
        - fileUrl
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
