openapi: 3.1.0
info:
  title: Api
  version: 0.2.0
  description: 통번역 플랫폼 API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: users
    description: User operations
  - name: projects
    description: Project operations
  - name: quotes
    description: Quote operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /users:
    post:
      operationId: createUser
      tags: [users]
      summary: Create a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /projects:
    post:
      operationId: createProject
      tags: [projects]
      summary: Create a project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectRequest"
      responses:
        "201":
          description: Project created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      operationId: listProjects
      tags: [projects]
      summary: List all projects
      responses:
        "200":
          description: List of projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
  /quotes:
    post:
      operationId: createQuote
      tags: [quotes]
      summary: Create a quote for a project
      description: Creates a quote and updates the project status to "quoted"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateQuoteRequest"
      responses:
        "201":
          description: Quote created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quote"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Project not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /quotes/{id}/approve:
    post:
      operationId: approveQuote
      tags: [quotes]
      summary: Approve a quote
      description: Approves a quote and updates the project status to "approved"
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Quote approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quote"
        "400":
          description: Already approved or invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Quote not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    CreateUserRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        role:
          type: string
          enum: [customer, translator, admin]
          default: customer
      required:
        - email
    User:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        role:
          type: string
          enum: [customer, translator, admin]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - email
        - role
        - createdAt
    CreateProjectRequest:
      type: object
      properties:
        userId:
          type: integer
        title:
          type: string
      required:
        - userId
        - title
    Project:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        title:
          type: string
        status:
          type: string
          enum: [created, quoted, approved]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - userId
        - title
        - status
        - createdAt
    CreateQuoteRequest:
      type: object
      properties:
        projectId:
          type: integer
        price:
          type: number
          minimum: 0
      required:
        - projectId
        - price
    Quote:
      type: object
      properties:
        id:
          type: integer
        projectId:
          type: integer
        price:
          type: string
        status:
          type: string
          enum: [pending, sent, approved, rejected]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - projectId
        - price
        - status
        - createdAt
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
