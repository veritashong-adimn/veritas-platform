openapi: 3.1.0
info:
  title: Api
  version: 0.4.0
  description: 통번역 플랫폼 API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: users
    description: User operations
  - name: projects
    description: Project operations
  - name: quotes
    description: Quote operations
  - name: tasks
    description: Task operations
  - name: logs
    description: Log operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /users:
    post:
      operationId: createUser
      tags: [users]
      summary: Create a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /projects:
    post:
      operationId: createProject
      tags: [projects]
      summary: Create a project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectRequest"
      responses:
        "201":
          description: Project created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      operationId: listProjects
      tags: [projects]
      summary: List all projects
      responses:
        "200":
          description: List of projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
  /projects/{id}/match:
    post:
      operationId: matchProject
      tags: [projects]
      summary: Match a translator to an approved project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "201":
          description: Task created and translator matched
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "400":
          description: Project not approved or already matched
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Project or translator not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /quotes:
    post:
      operationId: createQuote
      tags: [quotes]
      summary: Create a quote for a project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateQuoteRequest"
      responses:
        "201":
          description: Quote created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quote"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Project not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /quotes/{id}/approve:
    post:
      operationId: approveQuote
      tags: [quotes]
      summary: Approve a quote
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Quote approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quote"
        "400":
          description: Already approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Quote not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /tasks/{id}/start:
    patch:
      operationId: startTask
      tags: [tasks]
      summary: Start a task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Task started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "400":
          description: Invalid state transition
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Task not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /tasks/{id}/complete:
    patch:
      operationId: completeTask
      tags: [tasks]
      summary: Complete a task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Task completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "400":
          description: Invalid state transition
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Task not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /logs:
    get:
      operationId: listLogs
      tags: [logs]
      summary: List all event logs
      parameters:
        - name: entityType
          in: query
          required: false
          schema:
            type: string
            enum: [project, quote, task]
        - name: entityId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Log"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    CreateUserRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        role:
          type: string
          enum: [customer, translator, admin]
          default: customer
      required:
        - email
    User:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        role:
          type: string
          enum: [customer, translator, admin]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - email
        - role
        - createdAt
    CreateProjectRequest:
      type: object
      properties:
        userId:
          type: integer
        title:
          type: string
      required:
        - userId
        - title
    Project:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        title:
          type: string
        status:
          type: string
          enum: [created, quoted, approved, matched, in_progress, completed]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - userId
        - title
        - status
        - createdAt
    CreateQuoteRequest:
      type: object
      properties:
        projectId:
          type: integer
        price:
          type: number
          minimum: 0
      required:
        - projectId
        - price
    Quote:
      type: object
      properties:
        id:
          type: integer
        projectId:
          type: integer
        price:
          type: string
        status:
          type: string
          enum: [pending, sent, approved, rejected]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - projectId
        - price
        - status
        - createdAt
    Task:
      type: object
      properties:
        id:
          type: integer
        projectId:
          type: integer
        translatorId:
          type: integer
        status:
          type: string
          enum: [waiting, assigned, working, done]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - projectId
        - translatorId
        - status
        - createdAt
    Log:
      type: object
      properties:
        id:
          type: integer
        entityType:
          type: string
          enum: [project, quote, task]
        entityId:
          type: integer
        action:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - entityType
        - entityId
        - action
        - createdAt
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
