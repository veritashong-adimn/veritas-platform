[phases.setup]
nixPkgs = ["antiword", "poppler_utils"]

[start]
# nix 프로파일 경로를 명시적으로 앞에 추가 — Railway/Nixpacks 환경에서 $PATH 확장이
# 불완전할 때도 antiword/pdftoppm 등 nix 패키지를 확실히 찾을 수 있도록 한다
cmd = "PATH=/nix/var/nix/profiles/default/bin:/usr/local/bin:/usr/bin:/bin:$PATH node --enable-source-maps ./dist/index.mjs"
